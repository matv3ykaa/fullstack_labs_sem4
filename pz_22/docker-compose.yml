services:
  backend1:
    image: node:18-alpine
    working_dir: /app
    environment:
      - PORT=3000
    command: sh -c "npm install && node server.js"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend2:
    image: node:18-alpine
    working_dir: /app
    environment:
      - PORT=3001
    command: sh -c "npm install && node server.js"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend3:
    image: node:18-alpine
    working_dir: /app
    environment:
      - PORT=3002
    command: sh -c "npm install && node server.js"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002"]
      interval: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  nginx:
    profiles: [nginx]
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
      backend3:
        condition: service_healthy
    restart: unless-stopped

  haproxy:
    profiles: [haproxy]
    image: haproxy:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
      backend3:
        condition: service_healthy
    restart: unless-stopped