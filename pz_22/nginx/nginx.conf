events {
    worker_connections 1024;
}

http {
    upstream backend{
        server backend1:3000 max_fails=2 fail_timeout=30s; # Сервер 1
        server backend2:3001 max_fails=2 fail_timeout=30s; # Сервер 2
        server backend3:3002 backup; # Резервный сервер
    }

    server {
        listen 80;
        location / {
            proxy_pass http://backend;
        }
    }
}