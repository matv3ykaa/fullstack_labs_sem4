global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s
    retries 3

frontend http_front
    bind *:8080
    default_backend http_back

backend http_back
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    server backend1 backend1:3000 check inter 5s fall 3 rise 2
    server backend2 backend2:3001 check inter 5s fall 3 rise 2
    server backend3 backend3:3002 check backup
